<!DOCTYPE html>
<html>
<head>
    <title>Mauli Ethnic Wear</title>

    <style>
        body {
            font-family: Arial;
            margin: 0;
            background: #f5f5f5;
        }

        header {
            background: #8B0000;
            color: white;
            padding: 20px;
            text-align: center;
        }

        h2 {
            margin-top: 0;
        }

        .form-section {
            background: white;
            margin: 20px;
            padding: 20px;
            border-radius: 10px;
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        .products {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
        }

        .card {
            background: white;
            margin: 15px;
            padding: 15px;
            width: 230px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        img {
            width: 100%;
            border-radius: 10px;
        }

        button {
            background: #25D366;
            color: white;
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 5px;
            cursor: pointer;
            font-size: 15px;
        }

        button:hover {
            background: #1ebe5d;
        }

        /* Floating WhatsApp */
        .whatsapp-float {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #25D366;
            color: white;
            font-size: 22px;
            padding: 15px;
            border-radius: 50%;
            text-decoration: none;
        }
    </style>

    <script>
        function orderProduct(product, price) {
            let name = document.getElementById("name").value;
            let phoneInput = document.getElementById("phone").value;
            let size = document.getElementById("size").value;
            let address = document.getElementById("address").value;

            if (name === "" || phoneInput === "" || size === "" || address === "") {
                alert("Please fill all details before ordering.");
                return;
            }

            let message = 
`🛍️ *New Order - Mauli Ethnic Wear*
--------------------------------
👗 Product: ${product}
💰 Price: ${price}
📏 Size: ${size}

👤 Customer Details:
Name: ${name}
Phone: ${phoneInput}
Address: ${address}`;

            // IMPORTANT: CHANGE THIS NUMBER
            let shopNumber = "919220102074";

            let url = "https://wa.me/" + shopNumber + "?text=" + encodeURIComponent(message);

            window.open(url, "_blank");
        }
    </script>

</head>

<body>

<header>
    <h1>Mauli Ethnic Wear</h1>
    <p>Traditional. Elegant. You.</p>
</header>

<!-- CUSTOMER FORM -->
<div class="form-section">
    <h2>Enter Your Details</h2>

    <input type="text" id="name" placeholder="Full Name">
    <input type="text" id="phone" placeholder="Phone Number">

    <select id="size">
        <option value="">Select Size</option>
        <option>S</option>
        <option>M</option>
        <option>L</option>
        <option>XL</option>
    </select>

    <input type="text" id="address" placeholder="Delivery Address">
</div>

<!-- PRODUCTS -->
<div class="products">

    <div class="card">
        <img src="https://via.placeholder.com/200">
        <h3>Kurta Set</h3>
        <p>₹999</p>
        <button onclick="orderProduct('Kurta Set','₹999')">
            Order on WhatsApp
        </button>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/200">
        <h3>Saree</h3>
        <p>₹1499</p>
        <button onclick="orderProduct('Saree','₹1499')">
            Order on WhatsApp
        </button>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/200">
        <h3>Lehenga</h3>
        <p>₹2499</p>
        <button onclick="orderProduct('Lehenga','₹2499')">
            Order on WhatsApp
        </button>
    </div>

</div>

<!-- FLOATING BUTTON -->
<a href="https://wa.me/919220102074" target="_blank" class="whatsapp-float">
💬
</a>

</body>
</html>
