<!DOCTYPE html>
<html>
<head>

        body {

        }
        header {

            padding: 15px;
            text-align: center;
        }
        .products {

            margin: 20px;

            background: white;

            width: 200px;

        }
        img {
            width: 100%;
            border-radius: 10px;
        }
        button {
            background: #8B0000;
            color: white;
            border: none;
            padding: 10px;
            cursor: pointer;
        }
    </style>
</head>

<body>

<header>
    <h1>Mauli Ethnic Wear</h1>
    <p>Traditional. Elegant. You.</p>
</header>

<div class="products">
    <div class="card">
        <img src="https://via.placeholder.com/200" />
        <h3>Kurta Set</h3>
        <p>₹999</p>
        <button>Buy Now</button>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/200" />
        <h3>Saree</h3>
        <p>₹1499</p>
        <button>Buy Now</button>
    </div>
</div>

</body>
</html>
