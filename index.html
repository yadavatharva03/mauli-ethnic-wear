<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mauli Ethnic Wear</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

<style>
body { font-family: Poppins; margin:0; background:#f5f5f5; }

header {
    background:#8B0000; color:white; text-align:center; padding:20px;
}

.products {
    display:grid;
    grid-template-columns: repeat(auto-fit,minmax(250px,1fr));
    gap:20px; padding:20px;
}

.card {
    background:white; padding:10px; border-radius:10px;
}

.card img { width:100%; height:250px; object-fit:cover; }

button {
    width:100%; padding:10px; margin-top:5px;
    border:none; border-radius:5px; cursor:pointer;
}

.add-cart { background:#25D366; color:white; }

.cart {
    position:fixed;
    right:0; top:0;
    width:300px; height:100%;
    background:white;
    box-shadow:-5px 0 10px rgba(0,0,0,0.2);
    padding:15px;
    overflow-y:auto;
}

.cart h3 { margin-top:0; }

</style>

<script>
let cart = [];

function addToCart(name, price){
    let item = cart.find(p => p.name === name);
    if(item){
        item.qty++;
    } else {
        cart.push({name, price, qty:1});
    }
    updateCart();
}

function updateCart(){
    let cartHTML = "";
    let total = 0;
    let totalQty = 0;

    cart.forEach(item=>{
        let itemTotal = item.price * item.qty;
        total += itemTotal;
        totalQty += item.qty;

        cartHTML += `
        <p>${item.name} x${item.qty} = ₹${itemTotal}</p>
        `;
    });

    // BUY 3 GET 1 FREE
    let freeItems = Math.floor(totalQty / 4);
    let discount = 0;

    if(freeItems > 0){
        let cheapest = Math.min(...cart.map(i => i.price));
        discount = freeItems * cheapest;
    }

    let finalTotal = total - discount;

    document.getElementById("cart-items").innerHTML = cartHTML;
    document.getElementById("total").innerText = total;
    document.getElementById("discount").innerText = discount;
    document.getElementById("final").innerText = finalTotal;
}

function placeOrder(){
    let name = document.getElementById("name").value;
    let phone = document.getElementById("phone").value;
    let address = document.getElementById("address").value;

    if(!name || !phone || !address){
        alert("Fill details");
        return;
    }

    let order = "🛍️ Order Details:\n";
    cart.forEach(i=>{
        order += `${i.name} x${i.qty} = ₹${i.price*i.qty}\n`;
    });

    order += `\nTotal: ₹${document.getElementById("total").innerText}`;
    order += `\nDiscount: ₹${document.getElementById("discount").innerText}`;
    order += `\nFinal: ₹${document.getElementById("final").innerText}`;

    order += `\n\nName: ${name}\nPhone: ${phone}\nAddress: ${address}`;

    window.open("https://wa.me/919220102074?text=" + encodeURIComponent(order));
}
</script>

</head>

<body>

<header>
<h1>Mauli Ethnic Wear</h1>
<p>Cart System Enabled 🛒</p>
</header>

<div style="padding:20px;">
<input id="name" placeholder="Name"><br><br>
<input id="phone" placeholder="Phone"><br><br>
<textarea id="address" placeholder="Address"></textarea>
</div>

<div class="products">

<div class="card">
<img src="https://images.unsplash.com/photo-1583391733956-6c78276477e2?w=800">
<h3>Short Kurti</h3>
<p>₹299</p>
<button class="add-cart" onclick="addToCart('Short Kurti',299)">Add to Cart</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1595777457583-95e059d581b8?w=800">
<h3>Dress</h3>
<p>₹699</p>
<button class="add-cart" onclick="addToCart('Dress',699)">Add to Cart</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1541099649105-f69ad21f3246?w=800">
<h3>Jeans</h3>
<p>₹799</p>
<button class="add-cart" onclick="addToCart('Jeans',799)">Add to Cart</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1520975922284-9c8b7b0f2d16?w=800">
<h3>Top</h3>
<p>₹349</p>
<button class="add-cart" onclick="addToCart('Top',349)">Add to Cart</button>
</div>

</div>

<!-- CART -->
<div class="cart">
<h3>Your Cart</h3>
<div id="cart-items"></div>

<hr>
<p>Total: ₹<span id="total">0</span></p>
<p>Discount: ₹<span id="discount">0</span></p>
<h4>Final: ₹<span id="final">0</span></h4>

<button onclick="placeOrder()" style="background:#25D366;color:white;">Order on WhatsApp</button>
</div>

</body>
</html>
