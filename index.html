<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mauli Ethnic Wear</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root {
    --primary-color: #8B0000;
    --accent-color: #D4AF37;
    --bg-color: #fbfbfb;
    --text-color: #333;
}

body {
    font-family: 'Poppins', sans-serif;
    margin: 0;
    background: var(--bg-color);
}

header {
    background: linear-gradient(135deg, var(--primary-color), #5a0000);
    color: white;
    padding: 40px 20px;
    text-align: center;
}

h2.section-title {
    text-align: center;
    margin-top: 40px;
    color: var(--primary-color);
    font-family: 'Playfair Display';
}

.products {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 25px;
    padding: 20px;
}

.card {
    background: white;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 5px 15px rgba(0,0,0,0.08);
    position: relative;
}

.card img {
    width: 100%;
    height: 320px;
    object-fit: cover;
}

.card-content {
    padding: 15px;
    text-align: center;
}

.price {
    font-weight: bold;
    margin: 10px 0;
}

/* Offer badge */
.badge {
    position: absolute;
    top: 10px;
    left: 10px;
    background: gold;
    color: black;
    padding: 5px 10px;
    font-size: 12px;
    border-radius: 5px;
}

button {
    width: 100%;
    padding: 10px;
    border: none;
    margin-top: 5px;
    border-radius: 6px;
    cursor: pointer;
}

.btn-whatsapp { background: #25D366; color: white; }
.btn-upi { background: var(--accent-color); }

</style>

<script>
const SHOP_WHATSAPP = "919220102074"; 
const UPI_ID = "yadavatharva03@oksbi"; 
const SHOP_NAME = "Mauli Ethnic Wear";

function validateForm() {
    let name = document.getElementById("name").value;
    let phone = document.getElementById("phone").value;
    let size = document.getElementById("size").value;
    let address = document.getElementById("address").value;

    if (!name || !phone || !size || !address) {
        alert("Fill all details first!");
        return null;
    }
    return { name, phone, size, address };
}

function orderOnWhatsApp(product, price) {
    const user = validateForm();
    if (!user) return;

    let msg = `🛍️ Order - ${SHOP_NAME}
Product: ${product}
Price: ₹${price}
Size: ${user.size}

Name: ${user.name}
Phone: ${user.phone}
Address: ${user.address}`;

    window.open("https://wa.me/" + SHOP_WHATSAPP + "?text=" + encodeURIComponent(msg));
}
</script>

</head>

<body>

<header>
<h1>Mauli Ethnic Wear</h1>
<p>Starting ₹299 | Trendy Collections</p>
</header>

<div style="padding:20px; max-width:500px; margin:auto;">
<input type="text" id="name" placeholder="Name">
<input type="tel" id="phone" placeholder="Phone">
<select id="size">
<option value="">Select Size</option>
<option>S</option><option>M</option><option>L</option><option>XL</option>
</select>
<textarea id="address" placeholder="Address"></textarea>
</div>

<!-- SHORT KURTIS -->
<h2 class="section-title">Short Kurtis (Starting ₹299)</h2>
<div class="products">

<div class="card">
<div class="badge">Buy 3 Get 1</div>
<img src="https://images.unsplash.com/photo-1583391733956-6c78276477e2?w=800">
<div class="card-content">
<h3>Casual Short Kurti</h3>
<p class="price">₹299</p>
<button class="btn-whatsapp" onclick="orderOnWhatsApp('Short Kurti',299)">Order</button>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1602810318383-e386cc2a3ccf?w=800">
<div class="card-content">
<h3>Printed Kurti</h3>
<p class="price">₹399</p>
<button class="btn-whatsapp" onclick="orderOnWhatsApp('Printed Kurti',399)">Order</button>
</div>
</div>

</div>

<!-- LONG KURTIS -->
<h2 class="section-title">Long Kurtis</h2>
<div class="products">

<div class="card">
<div class="badge">Offer</div>
<img src="https://images.unsplash.com/photo-1617251137884-f135eccf6942?w=800">
<div class="card-content">
<h3>Elegant Long Kurti</h3>
<p class="price">₹599</p>
<button class="btn-whatsapp" onclick="orderOnWhatsApp('Long Kurti',599)">Order</button>
</div>
</div>

</div>

<!-- DRESSES -->
<h2 class="section-title">Dresses</h2>
<div class="products">

<div class="card">
<div class="badge">Buy 3 Get 1</div>
<img src="https://images.unsplash.com/photo-1595777457583-95e059d581b8?w=800">
<div class="card-content">
<h3>Floral Dress</h3>
<p class="price">₹699</p>
<button class="btn-whatsapp" onclick="orderOnWhatsApp('Dress',699)">Order</button>
</div>
</div>

</div>

<!-- JEANS -->
<h2 class="section-title">Jeans</h2>
<div class="products">

<div class="card">
<img src="https://images.unsplash.com/photo-1541099649105-f69ad21f3246?w=800">

<h3>Blue Denim Jeans</h3>
<p class="price">₹799</p>
<button class="btn-whatsapp" onclick="orderOnWhatsApp('Jeans',799)">Order</button>

</div>

</div>

<!-- TOPS -->
<h2 class="section-title">Tops</h2>
<div class="products">

<div class="card">
<div class="badge">Hot Deal</div>
<img src="https://images.unsplash.com/photo-1520975922284-9c8b7b0f2d16?w=800">
<div class="card-content">
<h3>Stylish Top</h3>
<p class="price">₹349</p>
<button class="btn-whatsapp" onclick="orderOnWhatsApp('Top',349)">Order</button>

</div>

</div>

</body>
</html>
